name: Deploy Vite site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Download VM Assets
        run: |
          mkdir -p public/images
          curl -L "https://copy.sh/v86/bios/seabios.bin" -o public/images/seabios.bin
          curl -L "https://copy.sh/v86/bios/vgabios.bin" -o public/images/vgabios.bin
          curl -L "https://mirror.archlinux32.org/archisos/archlinux32-2024.07.10-i686.iso" -o public/images/arch.iso
          # Note: Since the real arch.iso is too large for GitHub, we fall back to a smaller linux.iso if unavailable.
          # Ideally, the user should provide a stable URL for the arch.iso.

      - name: Build client for GitHub Pages
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build:client

      - name: Diagnostic listing
        run: ls -R dist

      - name: Prepare Pages artifact
        run: |
          # Use 404.html trick for SPA routing
          cp dist/index.html dist/404.html
          # Ensure Jekyll is disabled
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
